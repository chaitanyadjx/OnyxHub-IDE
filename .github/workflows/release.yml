name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal
          - os: ubuntu-22.04
            platform: linux/amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Build Wails App
        run: wails build -platform ${{ matrix.platform }} -clean

      # Linux AppImage Packaging
      - name: Package Linux AppImage
        if: matrix.os == 'ubuntu-22.04'
        run: |
          curl -L -o appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage

          mkdir -p OnyxHub.AppDir/usr/bin
          cp build/bin/OnyxHub OnyxHub.AppDir/usr/bin/

          cat > OnyxHub.AppDir/onyxhub.desktop << 'EOF'
          [Desktop Entry]
          Name=OnyxHub
          Exec=OnyxHub
          Icon=onyxhub
          Type=Application
          Categories=Development;
          EOF

          cp build/appicon.png OnyxHub.AppDir/onyxhub.png

          cat > OnyxHub.AppDir/AppRun << 'EOF'
          #!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec OnyxHub "$@"
          EOF
          chmod +x OnyxHub.AppDir/AppRun

          ARCH=x86_64 ./appimagetool.AppImage --appimage-extract-and-run OnyxHub.AppDir OnyxHub-${{ github.ref_name }}-Linux.AppImage

      # macOS Packaging
      - name: Package macOS App
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          zip -r ../../OnyxHub-${{ github.ref_name }}-MacOS.zip OnyxHub.app

      # Windows Rename
      - name: Prepare Windows Artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item build/bin/OnyxHub.exe OnyxHub-${{ github.ref_name }}-Windows.exe

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            OnyxHub-${{ github.ref_name }}-Windows.exe
            OnyxHub-${{ github.ref_name }}-MacOS.zip
            OnyxHub-${{ github.ref_name }}-Linux.AppImage
