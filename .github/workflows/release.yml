name: Multi-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact_name: OnyxHub-Windows.exe
          - os: macos-latest
            platform: darwin/universal
            artifact_name: OnyxHub-MacOS.app
          - os: ubuntu-latest
            platform: linux/amd64
            artifact_name: OnyxHub-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Build Wails App
        run: |
          wails build -platform ${{ matrix.platform }} -clean

      # Linux AppImage Packaging
      - name: Package Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Install appimagetool
          wget https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          # Prepare AppDir
          mkdir -p OnyxHub.AppDir/usr/bin
          cp build/bin/OnyxHub OnyxHub.AppDir/usr/bin/
          
          # Create Desktop file
          echo "[Desktop Entry]
          Name=OnyxHub
          Exec=OnyxHub
          Icon=onyxhub
          Type=Application
          Categories=Development;" > OnyxHub.AppDir/onyxhub.desktop
          
          # Copy icon
          cp build/appicon.png OnyxHub.AppDir/onyxhub.png
          
          # Create AppRun
          echo '#!/bin/sh
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          exec OnyxHub "$@"' > OnyxHub.AppDir/AppRun
          chmod +x OnyxHub.AppDir/AppRun
          
          # Build AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run OnyxHub.AppDir OnyxHub-v${{ github.ref_name }}-Linux.AppImage

      # macOS Packaging (Zip the .app)
      - name: Package macOS App
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          zip -r ../../OnyxHub-v${{ github.ref_name }}-MacOS.zip OnyxHub.app

      # Windows Rename
      - name: Prepare Windows Artifact
        if: matrix.os == 'windows-latest'
        run: |
          cp build/bin/OnyxHub.exe OnyxHub-v${{ github.ref_name }}-Windows.exe

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OnyxHub-v${{ github.ref_name }}-Windows.exe
            OnyxHub-v${{ github.ref_name }}-MacOS.zip
            OnyxHub-v${{ github.ref_name }}-Linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
